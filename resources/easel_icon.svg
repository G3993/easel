<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a73e8"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </linearGradient>
    <linearGradient id="canvas" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e3f2fd"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>
  <!-- Back leg -->
  <line x1="310" y1="160" x2="350" y2="430" stroke="#90caf9" stroke-width="14" stroke-linecap="round"/>
  <!-- Front legs -->
  <line x1="175" y1="400" x2="220" y2="160" stroke="#bbdefb" stroke-width="16" stroke-linecap="round"/>
  <line x1="337" y1="400" x2="292" y2="160" stroke="#bbdefb" stroke-width="16" stroke-linecap="round"/>
  <!-- Shelf/tray -->
  <rect x="185" y="300" width="142" height="10" rx="5" fill="#90caf9"/>
  <!-- Canvas -->
  <rect x="168" y="100" width="176" height="200" rx="8" fill="url(#canvas)" stroke="#bbdefb" stroke-width="4"/>
  <!-- Abstract art on canvas - projection mapping vibe -->
  <polygon points="210,180 256,130 302,180" fill="#42a5f5" opacity="0.7"/>
  <polygon points="195,260 256,200 317,260" fill="#1565c0" opacity="0.5"/>
  <rect x="230" y="170" width="52" height="70" rx="4" fill="#1a73e8" opacity="0.4"/>
  <!-- Top knob -->
  <circle cx="256" cy="90" r="12" fill="#bbdefb"/>
</svg>
